name: build-ipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer || sudo xcode-select -p

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & archive (unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -project PocketPet.xcodeproj \
            -scheme PocketPet \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/PocketPet.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          mkdir -p Payload
          cp -r build/PocketPet.xcarchive/Products/Applications/PocketPet.app Payload/
          zip -r PocketPet-unsigned.ipa Payload
          ls -lh PocketPet-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketPet-unsigned-ipa
          path: PocketPet-unsigned.ipa
          if-no-files-found: error
