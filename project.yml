name: PocketPet
options:
  bundleIdPrefix: com.goodday1024
  deploymentTarget:
    iOS: "16.2"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: zh_CN
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic

targets:
  PocketPet:
    type: application
    platform: iOS
    sources:
      - path: PocketPet
      - path: Shared
    info:
      path: PocketPet/Info.plist
      properties:
        CFBundleDisplayName: PocketPet
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodday1024.PocketPet
        INFOPLIST_FILE: PocketPet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: PocketPetWidgets
        embed: true

  PocketPetWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: PocketPetWidgets
      - path: Shared
    info:
      path: PocketPetWidgets/Info.plist
      properties:
        CFBundleDisplayName: PocketPet LiveActivity
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goodday1024.PocketPet.PocketPetWidgets
        INFOPLIST_FILE: PocketPetWidgets/Info.plist
        SKIP_INSTALL: YES
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework
